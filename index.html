<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tela de Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #000;
      color: white;
    }
    .login-container {
      background: #000;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
      width: 300px;
      text-align: center;
    }
    .login-container img {
      width: 60px;
      margin-bottom: 20px;
    }
    .login-container h2 {
      margin-bottom: 10px;
    }
    .login-container p {
      margin-bottom: 20px;
      color: #ccc;
    }
    .input-group {
      margin-bottom: 15px;
    }
    .input-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #333;
      border-radius: 5px;
      background-color: #222;
      color: white;
    }
    .what{
   color:blue;
  width: 50px;
 background-color: #0056b3;
 width: 100%;
 height: 100%;
 border-radius:10px;
 height: 50px;
 text-align: center;
 top: 250%;
 

 }
a{

  color: white;
  text-decoration: none;
  top: 250px;
}
    
    .btn {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .btn:hover {
      background: #0056b3;
    }
    .error-message {
      color: red;
      font-size: 14px;
      margin-top: 10px;
    }
    .login-container .alternative {
      margin-top: 20px;
      font-size: 14px;
      color: #ccc;
    

    }
    .login-container .whatsapp-btn {
      width: 100%;
      padding: 10px;
      background: #25D366;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container .whatsapp-btn img {
      margin-right: 10px;
      width: 20px;
    }
  </style>
</head>
<body>
  <div class="login-container">
  <img style="width: 259px;border-radius: 10px;height: 20%;" src="bot.jfif">
    <h2>Welcome</h2>
    <p>100% de acertividade</p>
    <form id="loginForm">
      <div class="input-group">
        <input type="text" id="username" placeholder="Numero" required>
      </div>
      <div class="input-group">
        <input type="password" id="password" placeholder="Password" required>
      </div>
      <button type="submit" class="btn">LOG IN</button>
      <div id="errorMessage" class="error-message"></div>
    </form>
    <br><br>
    <a href="https://wa.me/244926240472?text=saudação+Avabot+preciso+me+registar." 
   target="_blank" 
   style="text-decoration: none; background-color: #25D366; color: white; padding: 10px 20px; border-radius: 5px; font-size: 16px;">
   Suporte via WhatsApp
</a>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      try {
        const response = await fetch("users.json");
        const users = await response.json();

        const user = users.find(
          (u) => u.username === username && u.password === password
        );

        if (user) {
          alert("Login bem-sucedido! Bem-vindo, " + username + "!");
          window.location.href = "bot.html"; // Redireciona para a página principal (bot.html)
        } else {
          document.getElementById("errorMessage").textContent =
            "Usuário ou senha incorretos!";
        }
      } catch (error) {
        console.error("Erro ao carregar os usuários:", error);
      }
    });
  </script>
</body>
</html>
